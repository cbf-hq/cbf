[package]
name = "cbf"
version.workspace = true
edition.workspace = true
authors.workspace = true
description.workspace = true
repository.workspace = true
keywords.workspace = true
license.workspace = true
readme.workspace = true

[features]
# An in-memory backend implementation for local development and API experiments.
dummy-backend = []
chromium-backend = []

[dependencies]
cbf-sys = { path = "../cbf-sys" }
thiserror.workspace = true
cursor-icon = { workspace = true }
async-channel.workspace = true
async-process.workspace = true
futures-lite.workspace = true
oneshot = { workspace = true, features = ["async", "std"] }
tracing.workspace = true

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = { workspace = true }
objc2-core-foundation = { workspace = true, features = ["CFCGTypes"] }
objc2-quartz-core = { workspace = true, features = [
  "CALayer", "CATransaction", "objc2-core-foundation"
] }

[target.'cfg(target_os = "macos")'.dependencies.objc2-foundation]
workspace = true
features = [
  "NSArray",
  "NSAttributedString",
  "NSData",
  "NSObject",
  "NSObjCRuntime",
  "NSRange",
  "NSString",
  "NSGeometry",
  "objc2-core-foundation"
]

[target.'cfg(target_os = "macos")'.dependencies.objc2-app-kit]
workspace = true
features = [
  "NSApplication",
  "NSCell",
  "NSDragging",
  "NSDraggingItem",
  "NSDraggingSession",
  "NSEvent",
  "NSGraphicsContext",
  "NSImage",
  "NSMenu",
  "NSMenuItem",
  "NSMenuItemBadge",
  "NSPasteboard",
  "NSResponder",
  "NSTextInputClient",
  "NSView",
  "NSWindow",
  "objc2-quartz-core"
]

[dev-dependencies]
clap = { workspace = true, features = ["derive"] }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
winit.workspace = true
raw-window-handle.workspace = true
dirs.workspace = true

[[example]]
name = "simpleapp"
path = "../../examples/simpleapp/main.rs"
required-features = ["chromium-backend"]
