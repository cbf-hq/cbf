<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CBF Toolbar</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg-top: #f7f4ec;
      --bg-bottom: #e9dfcc;
      --panel: rgba(255, 251, 244, 0.82);
      --panel-solid: rgba(255, 253, 248, 0.96);
      --surface: rgba(255, 255, 255, 0.92);
      --surface-strong: #ffffff;
      --line: rgba(47, 36, 13, 0.12);
      --line-strong: rgba(47, 36, 13, 0.18);
      --text: #2d2417;
      --muted: #746955;
      --accent: #0b7a67;
      --accent-hover: #096a59;
      --accent-soft: rgba(11, 122, 103, 0.12);
      --shadow: 0 10px 30px rgba(34, 25, 9, 0.10);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-top: #1b1f24;
        --bg-bottom: #111418;
        --panel: rgba(24, 28, 33, 0.76);
        --panel-solid: rgba(28, 32, 38, 0.92);
        --surface: rgba(40, 45, 51, 0.88);
        --surface-strong: #353c44;
        --line: rgba(236, 240, 245, 0.10);
        --line-strong: rgba(236, 240, 245, 0.16);
        --text: #edf1f5;
        --muted: #a8b0ba;
        --accent: #46b6a0;
        --accent-hover: #5dc4b0;
        --accent-soft: rgba(70, 182, 160, 0.16);
        --shadow: 0 12px 34px rgba(0, 0, 0, 0.32);
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Avenir Next", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0)),
        linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
      overflow: hidden;
    }

    .toolbar {
      width: 100%;
      height: 56px;
      display: grid;
      grid-template-columns: auto auto auto auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(180deg, var(--panel-solid), var(--panel)),
        linear-gradient(135deg, var(--accent-soft), transparent 55%);
      backdrop-filter: blur(18px) saturate(1.15);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    button,
    input {
      border: 1px solid var(--line);
      border-radius: 12px;
      font: inherit;
      color: inherit;
    }

    button {
      min-width: 40px;
      height: 36px;
      background: var(--surface);
      cursor: default;
      transition: background-color 120ms ease, border-color 120ms ease;
    }

    button:hover {
      background: var(--surface-strong);
      border-color: var(--line-strong);
    }

    button.primary {
      min-width: 76px;
      background: var(--accent);
      border-color: transparent;
      color: white;
    }

    button.primary:hover {
      background: var(--accent-hover);
    }

    input {
      width: 100%;
      height: 38px;
      padding: 0 14px;
      background: var(--surface);
      border-color: var(--line-strong);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    input::selection {
      background: var(--accent-soft);
    }

    .status-icon {
      width: 26px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      overflow: hidden;
      position: relative;
      flex: 0 0 auto;
    }

    .status-icon svg,
    .status-icon img {
      width: 18px;
      height: 18px;
      display: block;
      position: absolute;
      inset: 0;
      margin: auto;
    }

    .status-icon img[hidden],
    .status-icon svg[hidden] {
      display: none;
    }

    .status-icon.is-loading {
      color: var(--accent);
    }

    .status-icon.is-error {
      color: #c94e44;
    }

    .status-icon.is-loading .spinner-icon {
      animation: spin 900ms linear infinite;
    }

    .toolbar-center {
      min-width: 0;
      position: relative;
      display: grid;
    }

    .mode-panel {
      min-width: 0;
      display: grid;
      align-items: center;
      gap: 10px;
    }

    .mode-panel[hidden] {
      display: none;
    }

    .nav-panel {
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .find-panel {
      grid-template-columns: minmax(0, 1fr) auto auto auto auto;
    }

    .find-result {
      min-width: 84px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 0 8px;
      white-space: nowrap;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <div id="status-icon" class="status-icon" aria-live="polite" aria-label="Page status: default">
      <img id="status-favicon" alt="" hidden>
      <svg id="status-default-icon" viewBox="0 0 16 16" aria-hidden="true" hidden>
        <path fill="currentColor"
          d="M8 1.25a6.75 6.75 0 1 0 0 13.5A6.75 6.75 0 0 0 8 1.25Zm4.79 4H10.7a11.5 11.5 0 0 0-.87-2.39 5.28 5.28 0 0 1 2.96 2.39ZM8 2.62c.47.5 1.08 1.47 1.47 2.63H6.53C6.92 4.09 7.53 3.12 8 2.62ZM5.17 2.86a11.5 11.5 0 0 0-.87 2.39H2.21a5.28 5.28 0 0 1 2.96-2.39ZM1.75 8c0-.45.06-.88.17-1.29h2.1A12.8 12.8 0 0 0 4 8c0 .44.02.87.08 1.29h-2.1A5.3 5.3 0 0 1 1.75 8Zm.46 2.75H4.3c.2.85.5 1.66.87 2.39a5.28 5.28 0 0 1-2.96-2.39ZM8 13.38c-.47-.5-1.08-1.47-1.47-2.63h2.94c-.39 1.16-1 2.13-1.47 2.63Zm1.8-4.09H6.2A11.2 11.2 0 0 1 6.13 8c0-.44.03-.87.08-1.29H9.8c.05.42.08.85.08 1.29 0 .44-.03.87-.08 1.29Zm.03 3.85c.37-.73.67-1.54.87-2.39h2.09a5.28 5.28 0 0 1-2.96 2.39ZM11.98 9.29c.06-.42.08-.85.08-1.29 0-.44-.02-.87-.08-1.29h2.1c.11.41.17.84.17 1.29 0 .45-.06.88-.17 1.29h-2.1Z" />
      </svg>
      <svg id="status-error-icon" viewBox="0 0 16 16" aria-hidden="true" hidden>
        <path fill="currentColor"
          d="M3.22 3.22a.75.75 0 0 1 1.06 0L8 6.94l3.72-3.72a.75.75 0 1 1 1.06 1.06L9.06 8l3.72 3.72a.75.75 0 1 1-1.06 1.06L8 9.06l-3.72 3.72a.75.75 0 0 1-1.06-1.06L6.94 8 3.22 4.28a.75.75 0 0 1 0-1.06Z" />
      </svg>
      <svg id="status-loading-icon" class="spinner-icon" viewBox="0 0 16 16" aria-hidden="true" hidden>
        <path fill="currentColor"
          d="M8 1.25a.75.75 0 0 1 .75.75v1.54a.75.75 0 0 1-1.5 0V2A.75.75 0 0 1 8 1.25Zm0 9.71a.75.75 0 0 1 .75.75v2.29a.75.75 0 0 1-1.5 0v-2.29a.75.75 0 0 1 .75-.75Zm4.77-4.46a.75.75 0 0 1 0 1.5h-1.54a.75.75 0 0 1 0-1.5h1.54Zm-7.46 0a.75.75 0 0 1 0 1.5H2.77a.75.75 0 0 1 0-1.5h2.54Zm5.1-3.6a.75.75 0 0 1 1.06 1.06l-1.09 1.09a.75.75 0 0 1-1.06-1.06l1.09-1.09Zm-4.73 4.73a.75.75 0 0 1 1.06 1.06L5.6 9.78A.75.75 0 1 1 4.54 8.72l1.14-1.09Zm5.79 2.15a.75.75 0 0 1 0 1.06l-1.09 1.14a.75.75 0 0 1-1.06-1.06l1.09-1.14a.75.75 0 0 1 1.06 0Zm-5.79-5.24a.75.75 0 0 1 0 1.06L4.54 5.6A.75.75 0 0 1 3.48 4.54l1.14-1.09a.75.75 0 0 1 1.06 0Z" />
      </svg>
    </div>
    <button id="back" aria-label="Back">&larr;</button>
    <button id="forward" aria-label="Forward">&rarr;</button>
    <button id="reload" aria-label="Reload">&#8635;</button>
    <div class="toolbar-center">
      <div id="nav-panel" class="mode-panel nav-panel">
        <input id="address" aria-label="Address bar" value="https://www.google.com">
        <button id="open" class="primary">Open</button>
      </div>
      <div id="find-panel" class="mode-panel find-panel" hidden>
        <input id="find-query" aria-label="Find in page">
        <button id="find-previous" aria-label="Previous result">&uarr;</button>
        <button id="find-next" aria-label="Next result">&darr;</button>
        <div id="find-result" class="find-result" aria-live="polite">No results</div>
        <button id="find-close" aria-label="Close find bar">&times;</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const CHANNELS = {
        OPEN: 'simpleapp.nav.open',
        BACK: 'simpleapp.nav.back',
        FORWARD: 'simpleapp.nav.forward',
        RELOAD: 'simpleapp.nav.reload',
        STATE_REQUEST: 'simpleapp.state.request',
        STATE_NAVIGATION: 'simpleapp.state.navigation',
        FIND_SET_QUERY: 'simpleapp.find.set_query',
        FIND_NEXT: 'simpleapp.find.next',
        FIND_PREVIOUS: 'simpleapp.find.previous',
        FIND_CLOSE: 'simpleapp.find.close',
        FIND_STATE: 'simpleapp.find.state',
      };

      const backButton = document.getElementById('back');
      const forwardButton = document.getElementById('forward');
      const reloadButton = document.getElementById('reload');
      const openButton = document.getElementById('open');
      const addressInput = document.getElementById('address');
      const statusIcon = document.getElementById('status-icon');
      const statusFavicon = document.getElementById('status-favicon');
      const statusDefaultIcon = document.getElementById('status-default-icon');
      const statusErrorIcon = document.getElementById('status-error-icon');
      const statusLoadingIcon = document.getElementById('status-loading-icon');
      const navPanel = document.getElementById('nav-panel');
      const findPanel = document.getElementById('find-panel');
      const findInput = document.getElementById('find-query');
      const findPreviousButton = document.getElementById('find-previous');
      const findNextButton = document.getElementById('find-next');
      const findCloseButton = document.getElementById('find-close');
      const findResultNode = document.getElementById('find-result');
      let findDebounceTimer = null;
      let lastFindFocusSignal = 0;
      let currentNavigationState = {
        url: '',
        can_go_back: false,
        can_go_forward: false,
        is_loading: false,
        favicon_url: null,
      };
      let hasStatusError = false;
      let currentFindState = {
        visible: false,
        query: '',
        number_of_matches: 0,
        active_match_ordinal: 0,
        pending: false,
      };

      function setStatusError() {
        hasStatusError = true;
        renderStatusIcon();
      }

      function clearStatusError() {
        if (!hasStatusError) {
          return;
        }
        hasStatusError = false;
        renderStatusIcon();
      }

      function resetStatusIconNodes() {
        statusIcon.classList.remove('is-loading', 'is-error');
        statusFavicon.hidden = true;
        statusDefaultIcon.hidden = true;
        statusErrorIcon.hidden = true;
        statusLoadingIcon.hidden = true;
      }

      function setStatusAriaLabel(label) {
        statusIcon.setAttribute('aria-label', `Page status: ${label}`);
      }

      function renderStatusIcon() {
        resetStatusIconNodes();

        if (hasStatusError) {
          statusIcon.classList.add('is-error');
          statusErrorIcon.hidden = false;
          setStatusAriaLabel('error');
          return;
        }

        if (currentNavigationState.is_loading) {
          statusIcon.classList.add('is-loading');
          statusLoadingIcon.hidden = false;
          setStatusAriaLabel('loading');
          return;
        }

        if (currentNavigationState.favicon_url) {
          statusFavicon.src = currentNavigationState.favicon_url;
          statusFavicon.hidden = false;
          setStatusAriaLabel('favicon');
          return;
        }

        statusDefaultIcon.hidden = false;
        setStatusAriaLabel('default');
      }

      statusFavicon.addEventListener('error', () => {
        currentNavigationState.favicon_url = null;
        renderStatusIcon();
      });

      statusFavicon.addEventListener('load', () => {
        if (!hasStatusError && !currentNavigationState.is_loading) {
          setStatusAriaLabel('favicon');
        }
      });

      function normalizeUrl(raw) {
        const value = (raw || '').trim();
        if (!value) return 'about:blank';
        if (
          value.startsWith('http://') ||
          value.startsWith('https://') ||
          value.startsWith('about:') ||
          value.startsWith('app://')
        ) {
          return value;
        }
        return `https://${value}`;
      }

      async function invokeJson(channel, payload) {
        if (!window.cbf || typeof window.cbf.invoke !== 'function') {
          throw new Error('IPC is not available');
        }
        const raw = await window.cbf.invoke(
          channel,
          JSON.stringify(payload || {}),
          { content_type: 'application/json' }
        );
        if (!raw) return { ok: true, value: {} };
        try {
          return JSON.parse(raw);
        } catch (_) {
          return { ok: true, value: {} };
        }
      }

      function applyNavigationState(state) {
        if (!state || typeof state !== 'object') return;
        currentNavigationState = {
          url: typeof state.url === 'string' ? state.url : '',
          can_go_back: !!state.can_go_back,
          can_go_forward: !!state.can_go_forward,
          is_loading: !!state.is_loading,
          favicon_url: typeof state.favicon_url === 'string' && state.favicon_url.length > 0
            ? state.favicon_url
            : null,
        };
        if (typeof state.url === 'string' && state.url.length > 0) {
          addressInput.value = state.url;
        }
        backButton.disabled = !state.can_go_back;
        forwardButton.disabled = !state.can_go_forward;
        clearStatusError();
        renderStatusIcon();
      }

      async function requestState() {
        try {
          const response = await invokeJson(CHANNELS.STATE_REQUEST, {});
          if (response && response.ok) {
            applyNavigationState(response.value);
          }
        } catch (error) {
          setStatusError();
        }
      }

      function setFindMode(visible) {
        navPanel.hidden = !!visible;
        findPanel.hidden = !visible;
      }

      function updateFindButtons() {
        const hasQuery = currentFindState.query.length > 0;
        findNextButton.disabled = !hasQuery;
        findPreviousButton.disabled = !hasQuery;
      }

      function formatFindResult(state) {
        if (!state.visible || !state.query) {
          return 'No results';
        }
        if (state.pending) {
          return 'Searching…';
        }
        if (state.number_of_matches === 0) {
          return 'No results';
        }
        return `${state.active_match_ordinal}/${state.number_of_matches}`;
      }

      function applyFindState(state, focusSignal) {
        if (!state || typeof state !== 'object') return;
        const wasVisible = currentFindState.visible;
        currentFindState = {
          visible: !!state.visible,
          query: typeof state.query === 'string' ? state.query : '',
          number_of_matches: Number.isFinite(state.number_of_matches) ? state.number_of_matches : 0,
          active_match_ordinal: Number.isFinite(state.active_match_ordinal) ? state.active_match_ordinal : 0,
          pending: !!state.pending,
        };

        setFindMode(currentFindState.visible);
        findResultNode.textContent = formatFindResult(currentFindState);
        updateFindButtons();

        if (currentFindState.visible && focusSignal > lastFindFocusSignal) {
          lastFindFocusSignal = focusSignal;
          window.requestAnimationFrame(() => {
            findInput.focus();
            findInput.select();
          });
        } else if (!wasVisible && currentFindState.visible) {
          window.requestAnimationFrame(() => {
            findInput.focus();
            findInput.select();
          });
        }
      }

      function scheduleFindQuerySync() {
        if (findDebounceTimer !== null) {
          window.clearTimeout(findDebounceTimer);
        }
        findDebounceTimer = window.setTimeout(async () => {
          findDebounceTimer = null;
          try {
            const response = await invokeJson(CHANNELS.FIND_SET_QUERY, { query: findInput.value });
            if (!response || !response.ok) {
              setStatusError();
            }
          } catch (error) {
            setStatusError();
          }
        }, 150);
      }

      async function navigateOpen() {
        const url = normalizeUrl(addressInput.value);
        addressInput.value = url;
        try {
          const response = await invokeJson(CHANNELS.OPEN, { url });
          if (!response || !response.ok) {
            setStatusError();
            return;
          }
          hasStatusError = false;
          currentNavigationState.is_loading = true;
          renderStatusIcon();
        } catch (error) {
          setStatusError();
        }
      }

      async function invokeWithoutPayload(channel) {
        try {
          const response = await invokeJson(channel, {});
          if (!response || !response.ok) {
            setStatusError();
          }
        } catch (error) {
          setStatusError();
        }
      }

      async function closeFind() {
        if (findDebounceTimer !== null) {
          window.clearTimeout(findDebounceTimer);
          findDebounceTimer = null;
        }
        try {
          const response = await invokeJson(CHANNELS.FIND_CLOSE, {});
          if (!response || !response.ok) {
            setStatusError();
          }
        } catch (error) {
          setStatusError();
        }
      }

      backButton.addEventListener('click', () => invokeWithoutPayload(CHANNELS.BACK));
      forwardButton.addEventListener('click', () => invokeWithoutPayload(CHANNELS.FORWARD));
      reloadButton.addEventListener('click', () => invokeWithoutPayload(CHANNELS.RELOAD));
      openButton.addEventListener('click', navigateOpen);
      addressInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          navigateOpen();
        }
      });
      findInput.addEventListener('input', () => {
        scheduleFindQuerySync();
      });
      findInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          invokeWithoutPayload(event.shiftKey ? CHANNELS.FIND_PREVIOUS : CHANNELS.FIND_NEXT);
        } else if (event.key === 'Escape') {
          event.preventDefault();
          closeFind();
        }
      });
      findNextButton.addEventListener('click', () => invokeWithoutPayload(CHANNELS.FIND_NEXT));
      findPreviousButton.addEventListener('click', () => invokeWithoutPayload(CHANNELS.FIND_PREVIOUS));
      findCloseButton.addEventListener('click', closeFind);

      if (window.cbf && typeof window.cbf.listen === 'function') {
        window.cbf.listen((message) => {
          if (!message) {
            return;
          }
          let payload = null;
          if (typeof message.payload === 'string') {
            try {
              payload = JSON.parse(message.payload);
            } catch (_) {
              return;
            }
          } else {
            payload = message.payload;
          }
          if (message.channel === CHANNELS.STATE_NAVIGATION) {
            applyNavigationState(payload);
            return;
          }
          if (message.channel === CHANNELS.FIND_STATE) {
            applyFindState(payload, Number.isFinite(message.request_id) ? message.request_id : 0);
          }
        });
      } else {
        setStatusError();
      }

      requestState();
      updateFindButtons();
      renderStatusIcon();
    })();
  </script>
</body>

</html>
