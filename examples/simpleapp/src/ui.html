<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CBF Toolbar</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg-top: #f7f4ec;
      --bg-bottom: #e9dfcc;
      --panel: rgba(255, 251, 244, 0.82);
      --panel-solid: rgba(255, 253, 248, 0.96);
      --surface: rgba(255, 255, 255, 0.92);
      --surface-strong: #ffffff;
      --line: rgba(47, 36, 13, 0.12);
      --line-strong: rgba(47, 36, 13, 0.18);
      --text: #2d2417;
      --muted: #746955;
      --accent: #0b7a67;
      --accent-hover: #096a59;
      --accent-soft: rgba(11, 122, 103, 0.12);
      --shadow: 0 10px 30px rgba(34, 25, 9, 0.10);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-top: #1b1f24;
        --bg-bottom: #111418;
        --panel: rgba(24, 28, 33, 0.76);
        --panel-solid: rgba(28, 32, 38, 0.92);
        --surface: rgba(40, 45, 51, 0.88);
        --surface-strong: #353c44;
        --line: rgba(236, 240, 245, 0.10);
        --line-strong: rgba(236, 240, 245, 0.16);
        --text: #edf1f5;
        --muted: #a8b0ba;
        --accent: #46b6a0;
        --accent-hover: #5dc4b0;
        --accent-soft: rgba(70, 182, 160, 0.16);
        --shadow: 0 12px 34px rgba(0, 0, 0, 0.32);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0)),
        linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
    }

    .toolbar {
      height: 100vh;
      display: grid;
      grid-template-columns: auto auto auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(180deg, var(--panel-solid), var(--panel)),
        linear-gradient(135deg, var(--accent-soft), transparent 55%);
      backdrop-filter: blur(18px) saturate(1.15);
      box-shadow: var(--shadow);
    }

    button,
    input {
      border: 1px solid var(--line);
      border-radius: 12px;
      font: inherit;
      color: inherit;
    }

    button {
      min-width: 40px;
      height: 36px;
      background: var(--surface);
      cursor: default;
      transition: background-color 120ms ease, border-color 120ms ease;
    }

    button:hover {
      background: var(--surface-strong);
      border-color: var(--line-strong);
    }

    button.primary {
      min-width: 76px;
      background: var(--accent);
      border-color: transparent;
      color: white;
    }

    button.primary:hover {
      background: var(--accent-hover);
    }

    input {
      width: 100%;
      height: 38px;
      padding: 0 14px;
      background: var(--surface);
      border-color: var(--line-strong);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    input::selection {
      background: var(--accent-soft);
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <button id="back" aria-label="Back">&larr;</button>
    <button id="forward" aria-label="Forward">&rarr;</button>
    <button id="reload" aria-label="Reload">&#8635;</button>
    <input id="address" aria-label="Address bar" value="https://www.google.com">
    <button id="open" class="primary">Open</button>
  </div>
  <div id="status" class="hint" style="padding: 8px 14px;">Connecting…</div>

  <script>
    (function () {
      const CHANNELS = {
        OPEN: 'simpleapp.nav.open',
        BACK: 'simpleapp.nav.back',
        FORWARD: 'simpleapp.nav.forward',
        RELOAD: 'simpleapp.nav.reload',
        STATE_REQUEST: 'simpleapp.state.request',
        STATE_NAVIGATION: 'simpleapp.state.navigation',
      };

      const backButton = document.getElementById('back');
      const forwardButton = document.getElementById('forward');
      const reloadButton = document.getElementById('reload');
      const openButton = document.getElementById('open');
      const addressInput = document.getElementById('address');
      const statusNode = document.getElementById('status');

      function setStatus(text) {
        statusNode.textContent = text;
      }

      function normalizeUrl(raw) {
        const value = (raw || '').trim();
        if (!value) return 'about:blank';
        if (
          value.startsWith('http://') ||
          value.startsWith('https://') ||
          value.startsWith('about:') ||
          value.startsWith('app://')
        ) {
          return value;
        }
        return `https://${value}`;
      }

      async function invokeJson(channel, payload) {
        if (!window.cbf || typeof window.cbf.invoke !== 'function') {
          throw new Error('IPC is not available');
        }
        const raw = await window.cbf.invoke(
          channel,
          JSON.stringify(payload || {}),
          { content_type: 'application/json' }
        );
        if (!raw) return { ok: true, value: {} };
        try {
          return JSON.parse(raw);
        } catch (_) {
          return { ok: true, value: {} };
        }
      }

      function applyNavigationState(state) {
        if (!state || typeof state !== 'object') return;
        if (typeof state.url === 'string' && state.url.length > 0) {
          addressInput.value = state.url;
        }
        backButton.disabled = !state.can_go_back;
        forwardButton.disabled = !state.can_go_forward;
        setStatus(state.is_loading ? 'Loading…' : 'Ready');
      }

      async function requestState() {
        try {
          const response = await invokeJson(CHANNELS.STATE_REQUEST, {});
          if (response && response.ok) {
            applyNavigationState(response.value);
          }
        } catch (error) {
          const code = error && error.code ? error.code : 'UNKNOWN';
          setStatus(`State sync failed (${code})`);
        }
      }

      async function navigateOpen() {
        const url = normalizeUrl(addressInput.value);
        addressInput.value = url;
        try {
          const response = await invokeJson(CHANNELS.OPEN, { url });
          if (!response || !response.ok) {
            const code = response && response.code ? response.code : 'UNKNOWN';
            setStatus(`Open failed (${code})`);
            return;
          }
          setStatus('Navigating…');
        } catch (error) {
          const code = error && error.code ? error.code : 'UNKNOWN';
          setStatus(`Open failed (${code})`);
        }
      }

      async function invokeWithoutPayload(channel) {
        try {
          const response = await invokeJson(channel, {});
          if (!response || !response.ok) {
            const code = response && response.code ? response.code : 'UNKNOWN';
            setStatus(`Action failed (${code})`);
          }
        } catch (error) {
          const code = error && error.code ? error.code : 'UNKNOWN';
          setStatus(`Action failed (${code})`);
        }
      }

      backButton.addEventListener('click', () => invokeWithoutPayload(CHANNELS.BACK));
      forwardButton.addEventListener('click', () => invokeWithoutPayload(CHANNELS.FORWARD));
      reloadButton.addEventListener('click', () => invokeWithoutPayload(CHANNELS.RELOAD));
      openButton.addEventListener('click', navigateOpen);
      addressInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          navigateOpen();
        }
      });

      if (window.cbf && typeof window.cbf.listen === 'function') {
        window.cbf.listen((message) => {
          if (!message || message.channel !== CHANNELS.STATE_NAVIGATION) {
            return;
          }
          let payload = null;
          if (typeof message.payload === 'string') {
            try {
              payload = JSON.parse(message.payload);
            } catch (_) {
              return;
            }
          } else {
            payload = message.payload;
          }
          applyNavigationState(payload);
        });
      } else {
        setStatus('IPC unavailable');
      }

      requestState();
    })();
  </script>
</body>

</html>
