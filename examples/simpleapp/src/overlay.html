<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Overlay Test</title>
  <style>
    :root {
      color-scheme: light;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: transparent;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .label {
      padding: 20px 28px;
      background: rgba(18, 18, 18, 0.72);
      color: white;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }
  </style>
</head>

<body>
  <div style="position: absolute; left: 0; top: 0;">Top-left</div>
  <div class="label">Overlay test</div>
</body>

</html>
