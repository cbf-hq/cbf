version: "3"

vars:
  ALLOW_DIRTY: '{{default "false" .ALLOW_DIRTY}}'
  TAG: '{{default "" .TAG}}'
  ALLOW_DIRTY_FLAG:
    sh: |
      if [ "{{.ALLOW_DIRTY}}" = "true" ]; then
        printf '%s' '--allow-dirty'
      fi
  TAG_FLAG:
    sh: |
      if [ -n "{{.TAG}}" ]; then
        printf -- '--tag %s' "{{.TAG}}"
      fi

tasks:
  release:check:
    desc: Validate local MVP release prerequisites.
    cmds:
      - uv run tool release check {{.ALLOW_DIRTY_FLAG}} {{.TAG_FLAG}}

  release:build:
    desc: Build Chromium release artifacts into chromium/src/out/Release.
    cmds:
      - uv run tool build -t chrome -t cbf_bridge --out-dir out/Release

  release:licenses:
    desc: Generate CBF and Chromium license bundle files for the release.
    cmds:
      - uv run tool release licenses {{.TAG_FLAG}}

  release:source-info:
    desc: Generate SOURCE_INFO.txt for the current release tag.
    cmds:
      - uv run tool release source-info {{.ALLOW_DIRTY_FLAG}} {{.TAG_FLAG}}

  release:package:
    desc: Assemble the release archive under dist/release.
    cmds:
      - task: release:licenses
        vars:
          TAG: "{{.TAG}}"
      - task: release:source-info
        vars:
          TAG: "{{.TAG}}"
          ALLOW_DIRTY: "{{.ALLOW_DIRTY}}"
      - uv run tool release package {{.ALLOW_DIRTY_FLAG}} {{.TAG_FLAG}}

  release:
    desc: Run the full local MVP release flow.
    cmds:
      - task: release:check
        vars:
          TAG: "{{.TAG}}"
          ALLOW_DIRTY: "{{.ALLOW_DIRTY}}"
      - task: release:build
      - task: release:licenses
        vars:
          TAG: "{{.TAG}}"
      - task: release:source-info
        vars:
          TAG: "{{.TAG}}"
          ALLOW_DIRTY: "{{.ALLOW_DIRTY}}"
      - task: release:package
        vars:
          TAG: "{{.TAG}}"
          ALLOW_DIRTY: "{{.ALLOW_DIRTY}}"
