name: Documentations

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install mdBook
        run: |
          cargo install mdbook --locked --version 0.5.2

      - name: Build mdBook
        run: |
          mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: target/mdbook

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-slim
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
